<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Professional Calculator</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#1e293b;font-family:Arial}
.calc{background:#111827;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.4);width:340px}
#d{width:100%;height:60px;font-size:28px;text-align:right;border:none;border-radius:10px;padding:10px;margin-bottom:12px}
.g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button{height:56px;border:none;border-radius:10px;font-size:18px;background:#374151;color:#fff;cursor:pointer}
.op{background:#f59e0b}.eq{background:#16a34a}.cl{background:#dc2626}
</style></head><body>
<div class="calc"><input id="d" readonly>
<div class="g">
<button class="cl" onclick="clr()">C</button><button onclick="bk()">⌫</button><button onclick="add('%')">%</button><button class="op" onclick="add('/')">÷</button>
<button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button class="op" onclick="add('*')">×</button>
<button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button class="op" onclick="add('-')">−</button>
<button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button class="op" onclick="add('+')">+</button>
<button onclick="sq()">x²</button><button onclick="rt()">√</button><button onclick="add('0')">0</button><button class="eq" onclick="cal()">=</button>
</div></div>
<script>
const d=document.getElementById('d');
function add(v){d.value+=v}
function clr(){d.value=''}
function bk(){d.value=d.value.slice(0,-1)}
function sq(){if(d.value)d.value=(+d.value)*(+d.value)}
function rt(){if(d.value)d.value=Math.sqrt(+d.value)}
function cal(){try{d.value=Function('return '+d.value)()}catch(e){d.value='Error'}}
document.addEventListener('keydown',e=>{
if("0123456789+-*/.%".includes(e.key))add(e.key);
else if(e.key==="Enter")cal();
else if(e.key==="Backspace")bk();
else if(e.key==="Escape")clr();
});
</script></body></html>
